<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>你的属性最符合KPL中的哪个选手 - 趣味测试</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;overflow-x:hidden}
body{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 30%,#1a1a2e 50%,#2d1b3d 70%,#1e1a2a 100%);background-attachment:fixed;position:relative}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 600px 400px at 10% 20%,rgba(255,181,194,0.08) 0%,transparent 70%),radial-gradient(ellipse 500px 500px at 85% 30%,rgba(201,177,255,0.08) 0%,transparent 70%),radial-gradient(ellipse 400px 600px at 50% 80%,rgba(181,234,215,0.06) 0%,transparent 70%),radial-gradient(ellipse 300px 300px at 20% 70%,rgba(255,218,193,0.07) 0%,transparent 70%),radial-gradient(ellipse 400px 400px at 75% 75%,rgba(181,216,235,0.06) 0%,transparent 70%);pointer-events:none}
.bg-orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(60px);opacity:.12;animation:orbFloat 12s ease-in-out infinite alternate}
.bg-orb:nth-child(1){width:280px;height:280px;top:5%;left:8%;background:#FFB5C2;animation-delay:0s}
.bg-orb:nth-child(2){width:240px;height:240px;top:60%;right:5%;background:#C9B1FF;animation-delay:3s}
.bg-orb:nth-child(3){width:200px;height:200px;bottom:10%;left:15%;background:#B5EAD7;animation-delay:6s}
.bg-orb:nth-child(4){width:260px;height:260px;top:25%;right:20%;background:#FFDAC1;animation-delay:9s}
.bg-orb:nth-child(5){width:180px;height:180px;top:75%;left:60%;background:#B5D8EB;animation-delay:2s}
@keyframes orbFloat{0%{transform:translate(0,0) scale(1)}100%{transform:translate(30px,-20px) scale(1.1)}}
.glass{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.app-wrapper{position:relative;z-index:1;max-width:640px;margin:0 auto;min-height:100vh;padding:20px 16px 80px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.page{display:none;width:100%}.page.active{display:flex;flex-direction:column;align-items:center}
/* 页脚 */
.footer-disclaimer{position:fixed;bottom:0;left:0;right:0;z-index:100;text-align:center;padding:12px 16px;font-size:12px;color:rgba(255,215,0,.45);background:linear-gradient(transparent,rgba(26,26,46,.85) 40%);letter-spacing:1px;pointer-events:none}
.footer-disclaimer::before{content:"⚠️ "}
/* 颜色 */
:root{--gold:#FFD700;--gold-light:#FFE44D;--gold-dark:#C5A600;--gold-glow:rgba(255,215,0,.3);--text-primary:#f0e6d3;--text-secondary:rgba(240,230,211,.7);--pink:#FFB5C2;--lavender:#C9B1FF;--mint:#B5EAD7;--peach:#FFDAC1;--blue:#B5D8EB}
/* 第1页：开始 */
#page-start .hero-icon{font-size:72px;margin-bottom:8px;animation:heroBounce 2s ease-in-out infinite}
@keyframes heroBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
#page-start h1{font-size:36px;font-weight:800;color:var(--gold);text-align:center;text-shadow:0 0 40px var(--gold-glow);margin-bottom:12px;line-height:1.3}
#page-start .subtitle{font-size:15px;color:var(--text-secondary);text-align:center;margin-bottom:10px;line-height:1.6}
#page-start .info-card{width:100%;padding:20px 24px;margin:16px 0 28px}
#page-start .info-card p{color:var(--text-secondary);font-size:13px;line-height:1.8;text-align:center}
#page-start .info-card p span{color:var(--gold);font-weight:600}
.btn-start{display:inline-flex;align-items:center;gap:10px;padding:16px 48px;border:none;border-radius:50px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#1a1a2e;font-size:20px;font-weight:700;cursor:pointer;transition:all .3s;box-shadow:0 4px 24px var(--gold-glow)}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 8px 32px var(--gold-glow)}
.btn-start:active{transform:translateY(0)}
/* 第2页：答题 */
.progress-wrapper{width:100%;margin-bottom:24px}
.progress-info{display:flex;justify-content:space-between;font-size:13px;color:var(--text-secondary);margin-bottom:8px}
.progress-info span:last-child{color:var(--gold);font-weight:600}
.progress-bar-bg{width:100%;height:6px;border-radius:3px;background:rgba(255,255,255,.1);overflow:hidden}
.progress-bar-fill{height:100%;width:0%;border-radius:3px;background:linear-gradient(90deg,var(--gold-dark),var(--gold),var(--gold-light));transition:width .5s ease}
.question-card{width:100%;padding:28px 24px;animation:fadeSlideIn .6s ease}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.question-number{font-size:13px;color:var(--gold);font-weight:600;margin-bottom:12px;letter-spacing:1px}
.question-text{font-size:18px;color:var(--text-primary);font-weight:600;margin-bottom:20px;line-height:1.6}
.options-list{list-style:none;display:flex;flex-direction:column;gap:10px}
.option-item{padding:14px 18px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:var(--text-primary);font-size:14px;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:12px}
.option-item .option-label{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:rgba(255,215,0,.12);color:var(--gold);font-weight:700;font-size:13px;flex-shrink:0}
.option-item:hover{background:rgba(255,215,0,.08);border-color:rgba(255,215,0,.25);transform:translateX(4px)}
.option-item.selected{background:rgba(255,215,0,.12);border-color:var(--gold);box-shadow:0 0 16px var(--gold-glow)}
/* 第3页：结果 */
.result-card{width:100%;padding:32px 24px;text-align:center;animation:fadeSlideIn .8s ease}
.result-emoji{font-size:72px;margin-bottom:4px}
.result-player{font-size:36px;font-weight:800;color:var(--gold);text-shadow:0 0 40px var(--gold-glow);margin-bottom:2px}
.result-label{font-size:14px;color:var(--text-secondary);margin-bottom:12px}
.result-title{font-size:20px;font-weight:700;color:var(--text-primary);margin-bottom:12px}
.result-desc{font-size:14px;color:var(--text-secondary);line-height:1.8;text-align:left;margin-bottom:16px;padding:16px 18px;border-radius:12px;background:rgba(255,255,255,.03);border-left:3px solid var(--gold)}
.result-score{font-size:14px;color:var(--text-secondary);margin-bottom:20px}
.result-score strong{color:var(--gold);font-size:18px}
.btn-restart{display:inline-flex;align-items:center;gap:8px;padding:12px 32px;border:2px solid var(--gold);border-radius:50px;background:transparent;color:var(--gold);font-size:15px;font-weight:600;cursor:pointer;transition:all .25s;margin-top:4px}
.btn-restart:hover{background:rgba(255,215,0,.1);transform:translateY(-2px)}
.btn-share{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border:1px solid rgba(255,215,0,.3);border-radius:50px;background:rgba(255,215,0,.06);color:var(--text-secondary);font-size:13px;cursor:pointer;transition:all .25s;margin-top:8px}
.btn-share:hover{background:rgba(255,215,0,.1);color:var(--gold)}
/* 五维分析 */
.analysis-section{width:100%;margin-top:20px;padding:24px;animation:fadeSlideIn 1s ease}
.analysis-section h3{color:var(--gold);font-size:17px;margin-bottom:16px;text-align:center}
.analysis-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;margin-bottom:10px;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
.analysis-item .dim-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.analysis-item .dim-content{flex:1}
.analysis-item .dim-name{font-size:13px;color:var(--gold);font-weight:600;margin-bottom:3px}
.analysis-item .dim-text{font-size:13px;color:var(--text-secondary);line-height:1.6}
/* 飘落庆祝 */
.confetti-container{position:fixed;inset:0;z-index:200;pointer-events:none;overflow:hidden}
.confetti-piece{position:absolute;top:-40px;font-size:22px;animation:confettiFall linear forwards;opacity:.85}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg) scale(1);opacity:.9}80%{opacity:.7}100%{transform:translateY(105vh) rotate(720deg) scale(.4);opacity:0}}
/* 密匙输入 */
.secret-key-area{width:100%;margin:-8px 0 20px;display:flex;flex-direction:column;align-items:center;gap:8px}
.secret-key-area label{font-size:13px;color:var(--text-secondary);letter-spacing:.5px}
.secret-key-area .key-input-wrapper{display:flex;align-items:center;gap:8px;width:100%;max-width:280px}
.secret-key-area input[type="password"]{flex:1;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,215,0,.2);background:rgba(255,255,255,.06);color:var(--text-primary);font-size:14px;outline:none;transition:border-color .25s}
.secret-key-area input[type="password"]:focus{border-color:var(--gold);box-shadow:0 0 12px var(--gold-glow)}
.secret-key-area input[type="password"]::placeholder{color:rgba(255,255,255,.2)}
.secret-key-area .key-error{font-size:12px;color:#FF6B6B;min-height:18px;transition:opacity .3s;opacity:0}
.secret-key-area .key-error.show{opacity:1}
/* 响应式 */
@media(max-width:480px){.app-wrapper{padding:16px 12px 80px}#page-start h1{font-size:28px}.question-text{font-size:16px}.option-item{padding:12px 14px;font-size:13px}.result-player{font-size:30px}.result-emoji{font-size:56px}.btn-start{padding:14px 36px;font-size:17px}.analysis-item{padding:10px 12px}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,215,0,.2);border-radius:2px}
</style>
</head>
<body>
<div class="bg-orb"></div><div class="bg-orb"></div><div class="bg-orb"></div><div class="bg-orb"></div><div class="bg-orb"></div>
<div class="app-wrapper" id="app">

  <!-- === 第1页：开始 === -->

</div>

/* ===============================================================
   应用状态
   =============================================================== */
const state = { currentQ:0, answers:new Array(45).fill(null), isTransitioning:false };


function showPage(id){
  ['page-start','page-quiz','page-result'].forEach(p=>document.getElementById(p).classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0});
}

(function init(){
  document.getElementById('test-title').textContent = TEST_TITLE;
  document.getElementById('test-subtitle').textContent = TEST_SUBTITLE;
  document.getElementById('info-total-q').textContent = 45;
})();

function startQuiz(){
  state.currentQ = 0;
  state.answers = new Array(45).fill(null);
  state.isTransitioning = false;
  showPage('page-quiz');
  renderQuestion();
}

function renderQuestion(){
  const idx = state.currentQ, q = QUESTIONS[idx], total = 45;
  const pct = Math.round((idx / total) * 100);
  document.getElementById('progress-label').textContent = `第 ${idx+1} / ${total} 题`;
  document.getElementById('progress-pct').textContent = `${pct}%`;
  document.getElementById('progress-fill').style.width = `${pct}%`;
  document.getElementById('q-number').textContent = `第 ${idx+1} 题`;
  document.getElementById('q-text').textContent = q.text;
  const list = document.getElementById('q-options');
  list.innerHTML = '';
  const labels = ['A','B','C','D','E'];
  q.options.forEach((opt,i)=>{
    const li = document.createElement('li');
    li.className = 'option-item';
    if(state.answers[idx]===opt.score) li.classList.add('selected');
    li.innerHTML = `<span class="option-label">${labels[i]}</span><span>${opt.text}</span>`;
    li.dataset.score = opt.score;
    li.addEventListener('click', ()=>selectOption(li, opt.score));
    list.appendChild(li);
  });
  const card = document.getElementById('question-card');
  card.style.animation = 'none'; void card.offsetHeight;
  card.style.animation = 'fadeSlideIn 0.5s ease';
}

function selectOption(el, score){
  if(state.isTransitioning) return;
  const idx = state.currentQ;
  document.querySelectorAll('#q-options .option-item').forEach(item=>item.classList.remove('selected'));
  el.classList.add('selected');
  state.answers[idx] = score;
  if(idx === 45-1){
    state.isTransitioning = true;
    document.getElementById('progress-pct').textContent = '100%';
    document.getElementById('progress-fill').style.width = '100%';
    setTimeout(showResult, 600);
    return;
  }
  state.isTransitioning = true;
  setTimeout(()=>{ state.currentQ++; state.isTransitioning=false; renderQuestion(); }, 400);
}

function showResult(){
  const rawTotal = state.answers.reduce((s,v)=>s+(v||1), 0);
  const minRaw = 45 * 1;
  const maxRaw = 45 * 5;
  const normalized = Math.round((rawTotal - minRaw) / (maxRaw - minRaw) * 40);
  let tier = RESULT_TIERS.find(t => normalized>=t.min && normalized<=t.max);
  if(!tier) tier = RESULT_TIERS[RESULT_TIERS.length-1];

  document.getElementById('r-emoji').textContent = tier.emoji;
  document.getElementById('r-player').textContent = tier.player;
  document.getElementById('r-title').textContent = tier.title;
  document.getElementById('r-desc').textContent = tier.desc;
  document.getElementById('r-score').textContent = normalized;
  document.getElementById('r-tier-label').textContent = tier.title.split('·')[1]||tier.title;

  const list = document.getElementById('analysis-list');
  list.innerHTML = '';
  tier.analyses.forEach(a=>{
    const div = document.createElement('div');
    div.className = 'analysis-item';
    div.innerHTML = `<span class="dim-icon">${a[0]}</span><div class="dim-content"><div class="dim-name">${a[1]}</div><div class="dim-text">${a[2]}</div></div>`;
    list.appendChild(div);
  });

  showPage('page-result');
  fireConfetti();
}

function fireConfetti(){
  const icons = ['⚡','🏆','🔥','🎮','👑','💪','🌟','🎯','🚀','💎'];
  const container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);
  for(let i=0;i<60;i++){
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.textContent = icons[i%icons.length];
    p.style.left = Math.random()*100+'%';
    p.style.fontSize = (16+Math.random()*18)+'px';
    p.style.animationDuration = (2.5+Math.random()*3)+'s';
    p.style.animationDelay = Math.random()*2+'s';
    container.appendChild(p);
  }
  setTimeout(()=>{ if(container.parentNode) container.parentNode.removeChild(container); }, 8000);
}

function shareResult(){
  const player = document.getElementById('r-player').textContent;
  const title = document.getElementById('r-title').textContent;
  const text = `我测出了我的KPL分身是【${player}】- ${title}！你也来试试吧 🎮`;
  if(navigator.share){
    navigator.share({title:'KPL选手匹配测试',text:text,url:window.location.href});
  } else {
    navigator.clipboard.writeText(text).then(()=>alert('📋 结果已复制，分享给朋友吧！'));
  }
}

function restartQuiz(){
  state.currentQ = 0;
  state.answers = new Array(45).fill(null);
  state.isTransitioning = false;
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('progress-pct').textContent = '0%';
  showPage('page-start');
}


// 按钮事件绑定（addEventListener）
document.getElementById('btn-start-q').addEventListener('click', startQuiz);
document.getElementById('btn-restart-q').addEventListener('click', restartQuiz);
document.getElementById('btn-share-q').addEventListener('click', shareResult);
</script>
